apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: project-claw-hub-hpa
  namespace: project-claw
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: project-claw-hub
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
