hub:
  image:
    repository: ccr.ccs.tencentyun.com/project-claw/hub
    tag: latest
  env:
    CLAW_ENV: sealos
    PORT: "8765"
    TZ: Asia/Shanghai
  health:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
